services:
  - type: web
    name: aurora-briefing
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API Key"
      - key: APP_URL
        sync: false
        placeholder: "Your deployed Render App URL (e.g., https://aurora-briefing.onrender.com)"
